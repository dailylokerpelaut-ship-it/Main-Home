:absolute;inset:0;z-index:1;background-image:radial-gradient(circle,rgba(72,202,228,0.13) 1px,transparent 1px);background-size:38px 38px;animation:dotmove 26s linear infinite;mask-image:linear-gradient(180deg,black 0%, black 70%, transparent 100%);-webkit-mask-image:linear-gradient(180deg,black 0%, black 70%, transparent 100%)}\n@keyframes dotmove{from{background-position:0 0}to{background-position:38px 38px}}\n.hero-wave{position:absolute;bottom:-1px;left:0;right:0;z-index:2}\n.hero-wave svg{width:100%;height:auto}\n.hero-content{position:relative;z-index:3;max-width:1180px;width:100%;margin:0 auto;padding:64px 20px 140px;display:grid;grid-template-columns:1.05fr 1fr;gap:64px;align-items:center}\n\n.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(72,202,228,0.10);border:1px solid rgba(72,202,228,0.25);border-radius:30px;padding:6px 14px 6px 9px;margin-bottom:22px;backdrop-filter:blur(6px)}\n.hero-badge-dot{width:7px;height:7px;border-radius:50%;background:var(--wave);box-shadow:0 0 0 0 rgba(72,202,228,0.6);animation:pulse 2.2s ease-in-out infinite}\n@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(72,202,228,0.6)}70%{box-shadow:0 0 0 8px rgba(72,202,228,0)}100%{box-shadow:0 0 0 0 rgba(72,202,228,0)}}\n.hero-badge span{font-size:12px;font-weight:500;color:rgba(225,245,250,0.95);letter-spacing:.2px}\n\n.hero h1{font-family:'Fraunces',serif;font-size:clamp(34px, 5.4vw, 60px);font-weight:800;color:var(--white);line-height:1.05;margin-bottom:20px;letter-spacing:-0.02em}\n.hero h1 .accent{color:var(--merah);font-style:normal;position:relative;white-space:nowrap}\n.hero h1 .accent::after{content:'';position:absolute;left:0;right:0;bottom:-2px;height:3px;background:linear-gradient(90deg,var(--merah) 50%,#ffffff 50%);border-radius:2px;opacity:.85}\n.hero-sub{font-size:16px;color:rgba(255,255,255,0.65);line-height:1.7;margin-bottom:28px;max-width:520px}\n.hero-sub strong{color:#ffffff;font-weight:600}\n\n.hero-stats{display:flex;gap:36px;margin-bottom:32px;flex-wrap:wrap}\n.hstat-num{font-family:'Fraunces',serif;font-size:28px;font-weight:800;color:var(--white);line-height:1}\n.hstat-num span{color:var(--wave)}\n.hstat-label{font-size:12px;color:rgba(255,255,255,0.5);margin-top:5px;letter-spacing:.2px}\n\n.hero-btns{display:flex;gap:10px;flex-wrap:wrap}\n.btn-primary,.btn-secondary,.btn-ghost{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-size:14px;font-weight:600;padding:13px 20px;border-radius:10px;text-decoration:none;transition:transform .2s, box-shadow .2s, background .2s, border-color .2s, color .2s;letter-spacing:.1px;line-height:1.2;min-height:46px}\n.btn-primary{background:var(--wave);color:var(--ink);font-weight:700;box-shadow:0 4px 14px rgba(72,202,228,0.25)}\n.btn-primary:hover{background:#6dd8ea;transform:translateY(-2px);box-shadow:0 10px 24px rgba(72,202,228,0.4)}\n.btn-secondary{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.92);border:1px solid rgba(255,255,255,0.18)}\n.btn-secondary:hover{background:rgba(255,255,255,0.14);border-color:rgba(255,255,255,0.35);transform:translateY(-2px)}\n.btn-ghost{background:transparent;color:rgba(255,255,255,0.85);border:1px solid rgba(72,202,228,0.45)}\n.btn-ghost:hover{background:rgba(72,202,228,0.1);color:#fff;transform:translateY(-2px)}\n\n/* ── HERO VISUAL — animated seafarer scene ── */\n.hero-visual{position:relative;display:flex;justify-content:center;align-items:center}\n.scene{width:100%;max-width:420px;aspect-ratio:1/1;position:relative}\n.scene svg{width:100%;height:100%;overflow:visible}\n@keyframes bob{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-6px) rotate(1deg)}}\n@keyframes wave-y{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}\n@keyframes wave-y2{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}\n@keyframes drift{0%{transform:translateX(-30px)}100%{transform:translateX(30px)}}\n@keyframes cloud-drift{0%{transform:translateX(0)}100%{transform:translateX(20px)}}\n@keyframes wave-arm{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(18deg)}}\n@keyframes seagull{0%,100%{transform:translate(0,0)}25%{transform:translate(8px,-3px)}50%{transform:translate(16px,2px)}75%{transform:translate(8px,-2px)}}\n@keyframes wing{0%,100%{transform:scaleY(1)}50%{transform:scaleY(0.6)}}\n@keyframes sun-pulse{0%,100%{opacity:.85}50%{opacity:1}}\n.scene .ship{transform-origin:center;animation:bob 4.5s ease-in-out infinite}\n.scene .arm{transform-origin:62% 48%;animation:wave-arm 1.6s ease-in-out infinite}\n.scene .w1{animation:wave-y 3.4s ease-in-out infinite}\n.scene .w2{animation:wave-y2 4.2s ease-in-out infinite .3s}\n.scene .cloud{animation:cloud-drift 14s ease-in-out infinite alternate}\n.scene .gull{animation:seagull 6s ease-in-out infinite}\n.scene .gull .wing{transform-origin:center;animation:wing .5s ease-in-out infinite}\n.scene .sun{animation:sun-pulse 4s ease-in-out infinite}\n\n.hero-card-mini{position:absolute;background:rgba(14,26,18,0.85);backdrop-filter:blur(10px);border:1px solid rgba(72,202,228,0.25);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 10px 30px rgba(0,0,0,0.3)}\n.hero-card-mini.m1{top:8%;right:-8px;animation:bob 5s ease-in-out infinite}\n.hero-card-mini.m2{bottom:14%;left:-8px;animation:bob 5.5s ease-in-out infinite -1.5s}\n.hcm-num{font-family:'Fraunces',serif;font-size:18px;font-weight:800;color:var(--wave);line-height:1}\n.hcm-txt{font-size:11px;color:rgba(255,255,255,0.65);line-height:1.3}\n\n/* ── SECTION COMMONS ── */\n.wrap{max-width:1180px;margin:0 auto;padding:0 20px}\n.sec{padding:88px 0;position:relative}\n.sec-eyebrow{display:inline-flex;align-items:center;gap:10px;margin-bottom:14px}\n.eyebrow-dash{width:22px;height:2px;background:var(--sea2);border-radius:2px}\n.eyebrow-txt{font-size:11px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:var(--sea2)}\n.sec h2{font-family:'Fraunces',serif;font-size:clamp(28px, 3.4vw, 40px);font-weight:800;color:var(--ink);line-height:1.15;margin-bottom:14px;letter-spacing:-0.015em}\n.sec-lead{font-size:16px;color:var(--ink3);line-height:1.75;max-width:580px}\n\n.merah{color:var(--merah);font-weight:700}\n\n/* ── TENTANG ── */\n#tentang{background:var(--white);border-top:1px solid var(--border-soft);border-bottom:1px solid var(--border-soft)}\n.tentang-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center}\n.tentang-visual{position:relative}\n.tentang-box{background:linear-gradient(140deg,var(--ink) 0%,#143924 100%);border-radius:20px;padding:32px;color:var(--white);position:relative;overflow:hidden;box-shadow:var(--shadow-lg)}\n.tentang-box::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(72,202,228,0.18) 0%,transparent 70%);pointer-events:none}\n.tb-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(72,202,228,0.85);margin-bottom:18px;position:relative}\n.tb-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.07);position:relative}\n.tb-item:last-child{border:none;padding-bottom:0}\n.tb-icon{width:40px;height:40px;background:rgba(72,202,228,0.12);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:transform .25s, background .25s}\n.tb-item:hover .tb-icon{background:rgba(72,202,228,0.22);transform:scale(1.05)}\n.tb-text{font-size:14px;color:rgba(255,255,255,0.78);line-height:1.6}\n.tb-text strong{color:var(--white);font-weight:600;display:block;margin-bottom:3px;font-family:'Fraunces',serif;font-size:15px}\n.tentang-accent{position:absolute;bottom:-14px;right:-14px;background:var(--wave);border-radius:12px;padding:11px 18px;font-family:'Fraunces',serif;font-size:13px;font-weight:700;color:var(--ink);box-shadow:0 8px 20px rgba(72,202,228,0.3)}\n.tentang-text p{font-size:15.5px;color:var(--ink2);line-height:1.85;margin-bottom:14px}\n.tentang-text p:last-of-type{margin-bottom:0}\n.tentang-tag-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:24px}\n.tentang-tag{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;background:var(--green-light);color:var(--green);border:1px solid rgba(26,96,64,0.15)}\n\n/* ── BUKU ── */\n#buku{background:var(--foam)}\n.buku-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:36px}\n.buku-card{background:var(--white);border:1px solid var(--border);border-radius:18px;overflow:hidden;transition:transform .3s, box-shadow .3s, border-color .3s;position:relative;display:flex;flex-direction:column}\n.buku-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--sea2),var(--wave));opacity:0;transition:opacity .3s}\n.buku-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-md);border-color:rgba(0,150,199,0.3)}\n.buku-card:hover::before{opacity:1}\n.buku-card-top{padding:26px 26px 0;flex:1}\n.buku-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.4px;margin-bottom:14px}\n.pill-available{background:var(--green-light);color:var(--green)}\n.pill-soon{background:var(--gold-light);color:var(--gold)}\n.buku-num{font-size:11px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--ink3);margin-bottom:6px}\n.buku-title{font-family:'Fraunces',serif;font-size:22px;font-weight:800;color:var(--ink);line-height:1.2;margin-bottom:10px;letter-spacing:-0.01em}\n.buku-desc{font-size:14px;color:var(--ink3);line-height:1.7;margin-bottom:18px}\n.buku-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:22px}\n.btag{font-size:11px;padding:4px 10px;border-radius:8px;background:var(--foam);color:var(--ink2);border:1px solid var(--border-soft);font-weight:500}\n.buku-card-bottom{padding:16px 26px;border-top:1px solid var(--border-soft);display:flex;align-items:center;justify-content:space-between;gap:12px;background:#fbfdfb}\n.buku-price{font-family:'Fraunces',serif;font-size:20px;font-weight:800;color:var(--ink);line-height:1.1}\n.buku-price span{display:block;font-size:11px;font-weight:500;color:var(--ink3);font-family:'Plus Jakarta Sans',sans-serif;margin-top:2px}\n.btn-buku{display:inline-flex;align-items:center;gap:6px;background:var(--ink);color:var(--white);font-size:13px;font-weight:600;padding:10px 18px;border-radius:9px;text-decoration:none;transition:background .2s, transform .2s;flex-shrink:0}\n.btn-buku:hover{background:var(--sea);transform:translateY(-1px)}\n\n/* ── KOMUNITAS ── */\n#komunitas{background:var(--ink);overflow:hidden;position:relative}\n#komunitas::before{content:'';position:absolute;top:-100px;right:-100px;width:420px;height:420px;background:radial-gradient(circle,rgba(72,202,228,0.10) 0%,transparent 70%);pointer-events:none}\n#komunitas::after{content:'';position:absolute;bottom:-100px;left:-100px;width:420px;height:420px;background:radial-gradient(circle,rgba(26,96,64,0.18) 0%,transparent 70%);pointer-events:none}\n#komunitas .sec h2,#komunitas .sec-lead,#komunitas .eyebrow-txt{position:relative}\n.kom-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:44px;position:relative}\n.kom-card{border-radius:16px;padding:26px;transition:transform .3s, border-color .3s, background .3s;position:relative;overflow:hidden;display:flex;flex-direction:column}\n.kom-card:hover{transform:translateY(-4px)}\n.kom-wa{background:rgba(37,211,102,0.07);border:1px solid rgba(37,211,102,0.2)}\n.kom-wa:hover{border-color:rgba(37,211,102,0.5);background:rgba(37,211,102,0.12)}\n.kom-trakteer{background:rgba(231,76,60,0.07);border:1px solid rgba(231,76,60,0.2)}\n.kom-trakteer:hover{border-color:rgba(231,76,60,0.5);background:rgba(231,76,60,0.12)}\n.kom-survey{background:rgba(72,202,228,0.07);border:1px solid rgba(72,202,228,0.22)}\n.kom-survey:hover{border-color:rgba(72,202,228,0.5);background:rgba(72,202,228,0.12)}\n.kom-icon{
